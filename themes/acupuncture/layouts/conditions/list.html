{{ define "main" }}

<div class="container">

<h1>Conditions We Treat</h1>

<p class="conditions-intro">
Explore common health concerns and learn more about individualized care approaches at Zhenchi Kalpa Acupuncture Clinic.
</p>

<div class="conditions-grid">

{{ range .Pages }}

<div class="condition-card">

{{ if .Params.featured_image }} <img
 class="condition-thumb"
 src="{{ .Params.featured_image }}"
 alt="{{ .Title }}">
{{ end }}

<div class="condition-card-content">

<h2>
<a href="{{ .RelPermalink }}">
{{ .Title }}
</a>
</h2>

<p>{{ .Params.description }}</p>

<a href="{{ .RelPermalink }}" class="btn">
Read More
</a>

</div>

</div>

{{ end }}

</div>

</div>

{{ end }}
